server:
  port: 8090

spring:
  application:
    name: admin-service
  threads:
    virtual:
      enabled: true
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/micro_admin_db
    username: postgres
    password: 9909
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8082}

payment-service:
  url: ${PAYMENT_SERVICE_URL:http://localhost:8081}

app:
  internal-secret: ${INTERNAL_SECRET}
  jwt:
    secret: ${ADMIN_JWT_SECRET}
    expiration: ${ADMIN_JWT_EXPIRATION:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,threaddump
  endpoint:
    health:
      show-details: always
