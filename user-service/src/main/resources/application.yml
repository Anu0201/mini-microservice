spring:
  application:
    name: user-service
  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/micro_user_db
    username: postgres
    password: 9909
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

server:
  port: 8082

app:
  internal-secret: ${INTERNAL_SECRET:my-super-shared-secret-key-123}