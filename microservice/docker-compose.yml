services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 9909
      USER_SERVICE_URL: http://user-service:8082
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservice-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 9909
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-secret-key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservice-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 9909
      USER_SERVICE_URL: http://user-service:8082
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-secret-key}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservice-network

  admin-service:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: admin-service
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_admin_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 9909
      USER_SERVICE_URL: http://user-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - microservice-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8060:8060"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8081
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service
      - user-service
      - payment-service
    networks:
      - microservice-network

  postgres-db:
    image: postgres:15-alpine
    container_name: microservice-postgres
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9909
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: microservice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  microservice-network:
    driver: bridge