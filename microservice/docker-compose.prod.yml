services:
  auth-service:
    image: ${DOCKERHUB_USERNAME}/mini-microservice-auth-service:latest
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      USER_SERVICE_URL: http://user-service:8082
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - microservice-network
    restart: unless-stopped

  user-service:
    image: ${DOCKERHUB_USERNAME}/mini-microservice-user-service:latest
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - microservice-network
    restart: unless-stopped

  payment-service:
    image: ${DOCKERHUB_USERNAME}/mini-microservice-payment-service:latest
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      USER_SERVICE_URL: http://user-service:8082
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - microservice-network
    restart: unless-stopped

  admin-service:
    image: ${DOCKERHUB_USERNAME}/mini-microservice-admin-service:latest
    container_name: admin-service
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/micro_admin_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      USER_SERVICE_URL: http://user-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8081
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - microservice-network
    restart: unless-stopped

  gateway-service:
    image: ${DOCKERHUB_USERNAME}/mini-microservice-gateway-service:latest
    container_name: gateway-service
    ports:
      - "8060:8060"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8081
    depends_on:
      - auth-service
      - user-service
      - payment-service
    networks:
      - microservice-network
    restart: unless-stopped

  postgres-db:
    image: postgres:15-alpine
    container_name: microservice-postgres
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  microservice-network:
    driver: bridge