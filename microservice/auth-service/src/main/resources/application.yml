server:
  port: 8080

spring:
  application:
    name: auth-service

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/micro_auth_db
    username: postgres
    password: 9909
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

app:
  internal-secret: ${INTERNAL_SECRET:my-super-shared-secret-key-123}
  jwt:
    secret: ${JWT_SECRET:9a726673ea132d752495738c8230531234567890abcdef1234567890abcdef}
    expiration: ${JWT_EXPIRATION:86400000}

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
