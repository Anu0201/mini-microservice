server:
  port: 8083

spring:
  application:
    name: admin-service
  cloud:
    compatibility-verifier:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

services:
  user-service:
    url: http://localhost:8060
  auth-service:
    url: http://localhost:8060
  payment-service:
    url: http://localhost:8060
