server:
  port: 8081

spring:
  application:
    name: payment-service
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/micro_payment_db
    username: postgres
    password: 9909
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  internal-secret: ${INTERNAL_SECRET:my-super-shared-secret-key-123}

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8082}
