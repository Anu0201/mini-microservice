server:
  port: 8081

spring:
  application:
    name: payment-service
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/micro_payment_db
    username: postgres
    password: 9909
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

services:
  user-service:
    url: http://localhost:8082